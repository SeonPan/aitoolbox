<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --sidebar-bg: #0f172a;
            --bg-body: #f1f5f9;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --card-bg: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg-body); color: var(--text-main); display: flex; min-height: 100vh; }

        /* 侧边栏样式 */
        .sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            color: #fff;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }
        .sidebar-header {
            padding: 30px 20px;
            border-bottom: 1px solid #1e293b;
        }
        .sidebar-header h1 { font-size: 1.2rem; font-weight: 600; color: #38bdf8; }
        .sidebar-header p { font-size: 0.8rem; color: #94a3b8; margin-top: 5px; }

        .nav-list { list-style: none; padding: 20px 0; flex-grow: 1; }
        .nav-item {
            padding: 15px 25px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            font-size: 0.95rem;
            color: #cbd5e1;
            border-left: 4px solid transparent;
        }
        .nav-item:hover { background: #1e293b; color: #fff; }
        .nav-item.active {
            background: #1e293b;
            color: #fff;
            border-left-color: var(--primary);
            background: linear-gradient(90deg, #1e293b 0%, #0f172a 100%);
        }
        .nav-item .step-num {
            margin-right: 12px;
            font-family: monospace;
            opacity: 0.5;
        }

        .sidebar-footer {
            padding: 15px 25px;
            border-top: 1px solid #1e293b;
            text-align: center;
            font-size: 1rem;
            color: #64748b;
        }

        /* 主内容区 */
        .main-content {
            margin-left: 280px;
            flex-grow: 1;
            padding: 40px;
            width: calc(100% - 280px);
        }

        .content-header { margin-bottom: 30px; }
        .content-header h2 { font-size: 1.8rem; margin-bottom: 10px; color: #0f172a; }
        .content-header p { color: var(--text-muted); line-height: 1.6; }

        /* 工具卡片网格 */
        .tool-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            animation: fadeIn 0.5s ease;
        }

        @media (max-width: 640px) {
            .tool-grid {
                grid-template-columns: 1fr;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .tool-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -2px rgba(0,0,0,0.05);
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            border: 1px solid #e2e8f0;
        }
        .tool-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
            border-color: #bfdbfe;
        }

        .tag-row { display: flex; gap: 8px; margin-bottom: 15px; }
        .tag {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 500;
        }
        .tag-color-0 { background: #e0f2fe; color: #0369a1; }
        .tag-color-1 { background: #f0fdf4; color: #15803d; }
        .tag-color-2 { background: #fef3c7; color: #b45309; }

        .tool-name { font-size: 1.25rem; font-weight: 700; margin-bottom: 12px; color: #1e293b; }
        .tool-desc {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 20px;
            flex-grow: 1;
        }

        .action-btn {
            text-decoration: none;
            background: #f8fafc;
            color: var(--primary);
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: 0.2s;
            border: 1px solid #e2e8f0;
        }
        .action-btn:hover { background: var(--primary); color: #fff; border-color: var(--primary); }
        .modal-btn { cursor: pointer; border: none; font-family: inherit; }
        
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .btn-group .action-btn {
            flex: 1;
            min-width: 80px;
            text-align: center;
        }

        /* 弹窗样式 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }
        .modal-content {
            background: var(--card-bg);
            border-radius: 16px;
            width: 90%;
            max-width: 700px;
            max-height: 80vh;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid #e2e8f0;
        }
        .modal-header h3 { font-size: 1.3rem; color: #0f172a; }
        .modal-close {
            background: none;
            border: none;
            font-size: 1.8rem;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .modal-close:hover { background: #f1f5f9; color: #0f172a; }
        .modal-body {
            padding: 24px;
            overflow-y: auto;
            max-height: calc(80vh - 80px);
        }
        .modal-tags { margin-bottom: 20px; }
        .modal-prompt h4 {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .modal-prompt {
            position: relative;
        }
        .modal-prompt-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .modal-prompt h4 {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 0;
        }
        .copy-btn {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .copy-btn:hover { background: var(--primary-hover); }
        .copy-btn.copied {
            background: #10b981;
        }
        .modal-prompt pre {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.9rem;
            line-height: 1.7;
            color: #334155;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 400px;
            overflow-y: auto;
            margin: 0;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .sidebar { width: 70px; }
            .sidebar-header, .nav-item span:not(.step-num) { display: none; }
            .main-content { margin-left: 70px; padding: 20px; }
        }
    </style>
</head>

            title: "提示词模板",
            desc: "一些可复用的提示词模板，提升AI使用效率。",
            tools: [
                { name: "XX", tags: ["提示词"], desc: "XX是一个强大的提示词生成工具，支持多语言和多场景。", type: "modal", prompt: "提示词内容...", },
                { name: "XX", tags: ["提示词"], desc: "XX是一个强大的提示词生成工具，支持多语言和多场景。", type: "modal", prompt: "提示词内容...", },
                { name: "XX", tags: ["提示词"], desc: "XX是一个强大的提示词生成工具，支持多语言和多场景。", type: "modal", prompt: "提示词内容...", }
            ]
        },
    };

    function renderStage(stageId) {
        const stage = data[stageId];
        const contentArea = document.getElementById('contentArea');
        
        let toolsHtml = '';
        stage.tools.forEach((tool, index) => {
            const isModal = tool.type === 'modal';
            let buttonsHtml = '';
            
            // 处理弹窗按钮
            if (isModal) {
                buttonsHtml += `<button class="action-btn modal-btn" data-modal="${stageId}-${index}">查看提示词</button>`;
            }
            
            // 处理 links 数组（多个链接）
            if (tool.links && Array.isArray(tool.links)) {
                tool.links.forEach(linkItem => {
                    const btnText = linkItem.text || '访问官网';
                    const btnUrl = linkItem.url || '#';
                    
                    if (btnUrl.startsWith('stage:')) {
                        const targetStage = btnUrl.replace('stage:', '');
                        buttonsHtml += `<a href="#" class="action-btn" onclick="return goToStage('${targetStage}')">${btnText}</a>`;
                    } else {
                        buttonsHtml += `<a href="${btnUrl}" target="_blank" class="action-btn">${btnText}</a>`;
                    }
                });
            } 
            // 兼容旧的 link 参数（单个链接）
            else if (tool.link) {
                const isInternalLink = tool.link.startsWith('stage:');
                if (isInternalLink) {
                    const targetStage = tool.link.replace('stage:', '');
                    buttonsHtml += `<a href="#" class="action-btn" onclick="return goToStage('${targetStage}')">访问官网</a>`;
                } else {
                    buttonsHtml += `<a href="${tool.link}" target="_blank" class="action-btn">访问官网</a>`;
                }
            }
            
            toolsHtml += `
                <div class="tool-card">
                    <div class="tag-row">
                        ${tool.tags.map((tag, idx) => `<span class="tag tag-color-${idx % 3}">${tag}</span>`).join('')}
                    </div>
                    <div class="tool-name">${tool.name}</div>
                    <p class="tool-desc">${tool.desc}</p>
                    <div class="btn-group">${buttonsHtml}</div>
                </div>
            `;
        });

        contentArea.innerHTML = `
            <div class="content-header">
                <h2>${stage.title}</h2>
                <p>${stage.desc}</p>
            </div>
            <div class="tool-grid">
                ${toolsHtml}
            </div>
        `;
        
        // 绑定弹窗事件
        bindModalEvents(stageId);
    }
    
    function bindModalEvents(stageId) {
        document.querySelectorAll('.modal-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const modalId = this.dataset.modal;
                const [stage, index] = modalId.split('-');
                const tool = data[stage].tools[index];
                showModal(tool);
            });
        });
    }
    
    function showModal(tool) {
        const promptText = tool.prompt || '暂无提示词内容';
        const modalHtml = `
            <div class="modal-overlay" id="modalOverlay">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3>${tool.name}</h3>
                        <button class="modal-close" onclick="closeModal()">&times;</button>
                    </div>
                    <div class="modal-body">
                        <div class="modal-prompt">
                            <div class="modal-prompt-header">
                                <h4>提示词模板</h4>
                                <button class="copy-btn" onclick="copyPrompt(this, \`${escapeHtml(promptText)}\`)">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                                    </svg>
                                    复制
                                </button>
                            </div>
                            <pre>${escapeHtml(promptText)}</pre>
                        </div>
                    </div>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    async function copyPrompt(btn, text) {
        try {
            await navigator.clipboard.writeText(text);
            btn.classList.add('copied');
            btn.innerHTML = `
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
                已复制
            `;
            setTimeout(() => {
                btn.classList.remove('copied');
                btn.innerHTML = `
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                    复制
                `;
            }, 2000);
        } catch (err) {
            console.error('复制失败:', err);
            btn.textContent = '复制失败';
        }
    }
    
    function closeModal() {
        const modal = document.getElementById('modalOverlay');
        if (modal) modal.remove();
    }

    // 绑定侧边栏点击事件
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', function() {
            switchStage(this.dataset.stage);
        });
    });
    
    // 切换到指定 stage
    function switchStage(stageId) {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        const targetNav = document.querySelector(`.nav-item[data-stage="${stageId}"]`);
        if (targetNav) {
            targetNav.classList.add('active');
            renderStage(stageId);
        }
    }
    
    // 全局函数：从卡片链接跳转到指定 stage
    window.goToStage = function(stageId) {
        switchStage(stageId);
        return false;
    };

    // 初始渲染第一项
    renderStage('llm');
</script>
